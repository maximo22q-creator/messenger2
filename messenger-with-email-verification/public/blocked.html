<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заблокированные | Messenger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      color: #f8fafc;
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    
    .header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 24px; padding: 16px;
      background: rgba(30, 41, 59, 0.9);
      border-radius: 16px;
      border: 1px solid rgba(71, 85, 105, 0.5);
    }
    .back-btn {
      width: 40px; height: 40px;
      background: rgba(71, 85, 105, 0.3);
      border: none; border-radius: 10px;
      color: #f8fafc; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(71, 85, 105, 0.5); }
    .header h1 { font-size: 22px; font-weight: 700; }
    
    .card {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 20px;
      padding: 20px;
    }

    .info-text {
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
      padding: 12px 20px;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid rgba(99, 102, 241, 0.15);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h2 {
      color: #cbd5e1;
      font-size: 20px;
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 14px;
    }

    .blocked-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: rgba(15, 23, 42, 0.4);
      transition: background 0.2s;
    }
    .blocked-item:hover { background: rgba(15, 23, 42, 0.6); }

    .blocked-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .blocked-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .blocked-info {
      flex: 1;
      min-width: 0;
    }
    .blocked-name {
      font-weight: 600;
      font-size: 15px;
      color: #f8fafc;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .blocked-username {
      font-size: 12px;
      color: #94a3b8;
    }
    .blocked-date {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .unblock-btn {
      padding: 8px 16px;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 10px;
      color: #a5b4fc;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .unblock-btn:hover {
      background: rgba(99, 102, 241, 0.3);
      transform: translateY(-1px);
    }
    .unblock-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .avatar-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .avatar-2 { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
    .avatar-3 { background: linear-gradient(135deg, #10b981, #14b8a6); }
    .avatar-4 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .avatar-5 { background: linear-gradient(135deg, #ec4899, #f43f5e); }
    .avatar-6 { background: linear-gradient(135deg, #8b5cf6, #d946ef); }

    .loading {
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(71, 85, 105, 0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 14px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }

    @media (max-width: 600px) {
      .card { padding: 16px; }
      .blocked-item { padding: 12px; gap: 10px; }
      .blocked-avatar { width: 42px; height: 42px; font-size: 14px; }
      .unblock-btn { padding: 8px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="goBack()">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <h1>🚫 Заблокированные</h1>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="card">
      <div class="info-text" id="infoText">
        Эти пользователи не могут отправлять вам сообщения
      </div>
      <div id="blockedList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script>
    function getActiveAccount() {
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      const activeUsername = localStorage.getItem('activeUsername');
      return accounts.find(a => a.username === activeUsername) || null;
    }

    function getToken() {
      return getActiveAccount()?.token || null;
    }

    function goBack() {
      window.location.href = 'chat.html';
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function getAvatarClass(id) {
      const colors = ['avatar-1', 'avatar-2', 'avatar-3', 'avatar-4', 'avatar-5', 'avatar-6'];
      return colors[(parseInt(id) || 0) % colors.length];
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      if (!text) return '';
      return String(text).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Заблокирован сегодня';
      if (diffDays === 1) return 'Заблокирован вчера';
      if (diffDays < 30) return `Заблокирован ${diffDays} дн. назад`;
      return 'Заблокирован ' + date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
      setTimeout(() => box.style.display = 'none', 4000);
    }

    async function loadBlocked() {
      const token = getToken();
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const r = await fetch(`/api/blocked?token=${encodeURIComponent(token)}`);
        const d = await r.json();
        
        if (!d.success) {
          if (r.status === 401) {
            localStorage.clear();
            window.location.href = 'login.html';
            return;
          }
          showError(d.error || 'Ошибка загрузки');
          return;
        }

        renderBlocked(d.blocked);
      } catch (e) {
        showError('Ошибка сети');
      }
    }

    function renderBlocked(blocked) {
      const container = document.getElementById('blockedList');
      const infoText = document.getElementById('infoText');
      
      if (blocked.length === 0) {
        infoText.style.display = 'none';
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">✨</div>
            <h2>Список пуст</h2>
            <p>У вас нет заблокированных пользователей</p>
          </div>
        `;
        return;
      }

      infoText.style.display = 'block';
      infoText.textContent = `Заблокированных пользователей: ${blocked.length}`;

      container.innerHTML = blocked.map(user => {
        const displayName = user.display_name || user.username;
        const avatarHTML = user.avatar 
          ? `<div class="blocked-avatar"><img src="${user.avatar}" alt=""></div>`
          : `<div class="blocked-avatar ${getAvatarClass(user.id)}">${getInitials(displayName)}</div>`;
        
        return `
          <div class="blocked-item" data-username="${escapeAttr(user.username)}">
            ${avatarHTML}
            <div class="blocked-info">
              <div class="blocked-name">${escapeHtml(displayName)}</div>
              <div class="blocked-username">@${escapeHtml(user.username)}</div>
              <div class="blocked-date">${formatDate(user.created_at)}</div>
            </div>
            <button class="unblock-btn" onclick="unblockUser('${escapeAttr(user.username)}', this)">
              ✓ Разблокировать
            </button>
          </div>
        `;
      }).join('');
    }

    async function unblockUser(username, btn) {
      if (!confirm(`Разблокировать @${username}?\n\nПользователь снова сможет отправлять вам сообщения.`)) return;

      btn.disabled = true;
      btn.textContent = 'Разблокируем...';

      try {
        const r = await fetch('/api/unblock', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ token: getToken(), username })
        });
        const d = await r.json();
        
        if (d.success) {
          // Плавное скрытие карточки
          const item = document.querySelector(`.blocked-item[data-username="${CSS.escape(username)}"]`);
          if (item) {
            item.style.transition = 'all 0.3s ease';
            item.style.opacity = '0';
            item.style.transform = 'translateX(20px)';
            setTimeout(() => {
              loadBlocked();
            }, 300);
          } else {
            loadBlocked();
          }
        } else {
          showError(d.error || 'Ошибка');
          btn.disabled = false;
          btn.textContent = '✓ Разблокировать';
        }
      } catch (e) {
        showError('Ошибка сети');
        btn.disabled = false;
        btn.textContent = '✓ Разблокировать';
      }
    }

    // Загружаем при открытии
    loadBlocked();
  </script>
</body>
</html>
