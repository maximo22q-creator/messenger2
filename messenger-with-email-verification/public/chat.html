<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат | Messenger</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Меню переключения аккаунтов */
    .accounts-menu {
      position: absolute;
      bottom: 100%;
      left: 12px;
      right: 12px;
      background: rgba(30, 41, 59, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 8px;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
      display: none;
      max-height: 400px;
      overflow-y: auto;
      z-index: 100;
    }
    .accounts-menu.open { display: block; }
    .account-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .account-item:hover { background: rgba(99, 102, 241, 0.1); }
    .account-item.active { background: rgba(99, 102, 241, 0.15); }
    .account-item .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
      flex-shrink: 0;
    }
    .account-item .details { flex: 1; min-width: 0; }
    .account-item .name { font-size: 14px; font-weight: 600; color: #f8fafc; }
    .account-item .status { font-size: 11px; color: #94a3b8; }
    .account-item .remove-btn {
      background: transparent;
      border: none;
      color: #64748b;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 18px;
      transition: all 0.2s;
    }
    .account-item .remove-btn:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; }
    .account-menu-divider {
      height: 1px;
      background: rgba(71, 85, 105, 0.5);
      margin: 6px 0;
    }
    .account-action {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 14px;
      transition: background 0.2s;
    }
    .account-action:hover { background: rgba(99, 102, 241, 0.1); color: #a5b4fc; }
    .account-action.danger:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; }
    .current-user {
      position: relative;
      cursor: pointer;
    }
    .unread-dot {
      position: absolute;
      top: -2px; right: -2px;
      min-width: 16px; height: 16px;
      background: #ef4444;
      border-radius: 8px;
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
      border: 2px solid #1e293b;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>💬 Messenger</h1>
        
        <div class="current-user" onclick="toggleAccountsMenu(event)">
          <div style="position: relative;">
            <div class="avatar" id="myAvatar">?</div>
          </div>
          <div class="info">
            <div class="name" id="myName">Загрузка...</div>
            <div class="email" id="myUsername">...</div>
          </div>
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #94a3b8;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"/>
          </svg>

          <!-- Меню аккаунтов -->
          <div class="accounts-menu" id="accountsMenu">
            <div id="accountsList"></div>
            <div class="account-menu-divider"></div>
            <div class="account-action" onclick="addAccount(event)">
              <span style="font-size: 18px;">➕</span>
              <span>Добавить аккаунт</span>
            </div>
            <div class="account-action danger" onclick="logoutCurrent(event)">
              <span style="font-size: 18px;">🚪</span>
              <span>Выйти из этого аккаунта</span>
            </div>
          </div>
        </div>
      </div>

      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Найти пользователя по нику...">
      </div>

      <div class="users-list" id="usersList">
        <div class="users-title">Чаты</div>
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </aside>

    <main class="chat-area" id="chatArea">
      <div class="empty-chat" id="emptyChat">
        <div class="icon">💬</div>
        <h2>Выберите собеседника</h2>
        <p>Начните общение — найдите пользователя через поиск</p>
      </div>

      <div id="activeChat" style="display: none; flex-direction: column; height: 100%;">
        <header class="chat-header">
          <button class="mobile-back-btn" onclick="closeMobileChat()" title="Назад">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
          <div class="avatar" id="partnerAvatar">?</div>
          <div class="info">
            <div class="name" id="partnerName">Имя</div>
            <div class="status" id="partnerStatus">онлайн</div>
          </div>
        </header>

        <div class="messages-container" id="messagesContainer"></div>

        <div class="message-input-container">
          <div class="message-input-wrapper">
            <textarea 
              class="message-input" 
              id="messageInput" 
              placeholder="Введите сообщение..." 
              rows="1"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const state = {
      currentUser: { username: null, id: null },
      selectedUser: null,
      chats: [],
      searchResults: [],
      isSearching: false,
      messages: [],
      renderedMessageIds: new Set(),
      lastRenderedDate: '',
      pollInterval: null,
      usersPollInterval: null,
      accountsUnreadInterval: null,
      searchTimeout: null
    };

    // Получить текущий токен активного аккаунта
    function getCurrentToken() {
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      const activeUsername = localStorage.getItem('activeUsername');
      const account = accounts.find(a => a.username === activeUsername);
      return account?.token || null;
    }

    // Получить активный аккаунт
    function getActiveAccount() {
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      const activeUsername = localStorage.getItem('activeUsername');
      return accounts.find(a => a.username === activeUsername) || null;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const activeAccount = getActiveAccount();
      
      if (!activeAccount) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const r = await fetch('/api/auth/check', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ token: activeAccount.token })
        });
        const d = await r.json();
        
        if (!d.success) {
          removeAccount(activeAccount.username);
          const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
          if (accounts.length > 0) {
            localStorage.setItem('activeUsername', accounts[0].username);
            location.reload();
          } else {
            localStorage.clear();
            window.location.href = 'login.html';
          }
          return;
        }

        state.currentUser.username = d.user.username;
        state.currentUser.id = d.user.id;
      } catch (e) {
        state.currentUser.username = activeAccount.username;
        state.currentUser.id = activeAccount.userId;
      }

      updateCurrentUserUI();
      loadChats();
      loadAccountsUnread();
      
      state.usersPollInterval = setInterval(() => {
        if (!state.isSearching) loadChats();
      }, 5000);

      state.accountsUnreadInterval = setInterval(loadAccountsUnread, 8000);

      const messageInput = document.getElementById('messageInput');
      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
      });

      document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.trim();
        if (state.searchTimeout) clearTimeout(state.searchTimeout);
        if (query.length === 0) {
          state.isSearching = false;
          renderChats(state.chats);
          return;
        }
        state.searchTimeout = setTimeout(() => {
          searchUsers(query);
        }, 300);
      });

      // Закрытие меню аккаунтов при клике вне
      document.addEventListener('click', (e) => {
        const menu = document.getElementById('accountsMenu');
        const currentUser = document.querySelector('.current-user');
        if (menu.classList.contains('open') && !currentUser.contains(e.target)) {
          menu.classList.remove('open');
        }
      });
    });

    function updateCurrentUserUI() {
      document.getElementById('myName').textContent = state.currentUser.username;
      document.getElementById('myUsername').textContent = '@' + state.currentUser.username;
      document.getElementById('myAvatar').textContent = getInitials(state.currentUser.username);
      document.getElementById('myAvatar').className = `avatar ${getAvatarClass(state.currentUser.id)}`;
    }

    // =============================================
    // МУЛЬТИ-АККАУНТЫ
    // =============================================
    function toggleAccountsMenu(e) {
      e.stopPropagation();
      const menu = document.getElementById('accountsMenu');
      menu.classList.toggle('open');
      if (menu.classList.contains('open')) {
        renderAccountsMenu();
      }
    }

    async function loadAccountsUnread() {
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      const activeUsername = localStorage.getItem('activeUsername');
      
      for (const account of accounts) {
        if (account.username === activeUsername) {
          account.unreadCount = 0;
          continue;
        }
        try {
          const r = await fetch(`/api/unread-count?username=${encodeURIComponent(account.username)}`);
          const d = await r.json();
          if (d.success) {
            account.unreadCount = d.count;
          }
        } catch(e) {}
      }
      
      localStorage.setItem('accounts', JSON.stringify(accounts));
      
      // Обновляем UI если меню открыто
      const menu = document.getElementById('accountsMenu');
      if (menu.classList.contains('open')) {
        renderAccountsMenu();
      }
    }

    function renderAccountsMenu() {
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      const activeUsername = localStorage.getItem('activeUsername');
      const container = document.getElementById('accountsList');
      
      if (accounts.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding: 12px; color: #64748b; font-size: 13px;">Нет аккаунтов</div>';
        return;
      }

      container.innerHTML = accounts.map(acc => `
        <div class="account-item ${acc.username === activeUsername ? 'active' : ''}" 
             onclick="switchAccount('${escapeAttr(acc.username)}', event)">
          <div class="avatar ${getAvatarClass(acc.userId)}">${getInitials(acc.username)}</div>
          <div class="details">
            <div class="name">${escapeHtml(acc.username)}</div>
            <div class="status">${acc.username === activeUsername ? '✓ Активный' : (acc.unreadCount > 0 ? `${acc.unreadCount} новых` : '@' + acc.username)}</div>
          </div>
          ${acc.username !== activeUsername ? `<button class="remove-btn" onclick="removeAccountConfirm('${escapeAttr(acc.username)}', event)" title="Удалить">✕</button>` : ''}
        </div>
      `).join('');
    }

    async function switchAccount(username, e) {
      e.stopPropagation();
      const activeUsername = localStorage.getItem('activeUsername');
      if (username === activeUsername) return;
      
      localStorage.setItem('activeUsername', username);
      location.reload();
    }

    function removeAccountConfirm(username, e) {
      e.stopPropagation();
      if (!confirm(`Удалить аккаунт @${username} из списка?\n\nАккаунт не будет удалён с сервера, но пропадёт из этого списка.`)) return;
      removeAccount(username);
      renderAccountsMenu();
    }

    function removeAccount(username) {
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      const account = accounts.find(a => a.username === username);
      
      // Отзываем токен на сервере
      if (account) {
        fetch('/api/auth/logout', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ token: account.token })
        }).catch(() => {});
      }
      
      const filtered = accounts.filter(a => a.username !== username);
      localStorage.setItem('accounts', JSON.stringify(filtered));
    }

    function addAccount(e) {
      e.stopPropagation();
      window.location.href = 'login.html?addAccount=true';
    }

    async function logoutCurrent(e) {
      e.stopPropagation();
      if (!confirm('Выйти из этого аккаунта?')) return;

      const activeUsername = localStorage.getItem('activeUsername');
      removeAccount(activeUsername);
      
      const accounts = JSON.parse(localStorage.getItem('accounts') || '[]');
      if (accounts.length > 0) {
        localStorage.setItem('activeUsername', accounts[0].username);
        location.reload();
      } else {
        localStorage.clear();
        window.location.href = 'login.html';
      }
    }

    // =============================================
    // ЧАТЫ И СООБЩЕНИЯ
    // =============================================
    async function loadChats() {
      try {
        const response = await fetch(`/api/users?currentUsername=${encodeURIComponent(state.currentUser.username)}`);
        const data = await response.json();

        if (data.success) {
          state.chats = data.users;
          if (!state.isSearching) {
            renderChats(data.users);
          }
        }
      } catch (error) {
        console.error('Ошибка загрузки чатов:', error);
      }
    }

    async function searchUsers(query) {
      state.isSearching = true;
      try {
        const response = await fetch(
          `/api/search?query=${encodeURIComponent(query)}&currentUsername=${encodeURIComponent(state.currentUser.username)}`
        );
        const data = await response.json();

        if (data.success) {
          state.searchResults = data.users;
          renderSearchResults(data.users, query);
        }
      } catch (error) {
        console.error('Ошибка поиска:', error);
      }
    }

    function renderChats(chats) {
      const container = document.getElementById('usersList');
      
      if (chats.length === 0) {
        container.innerHTML = `
          <div class="users-title">Чаты</div>
          <div class="no-users">
            <div class="icon">💬</div>
            <p>У тебя пока нет чатов</p>
            <p style="margin-top: 8px; font-size: 12px;">Найди пользователя через поиск сверху</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="users-title">Чаты (${chats.length})</div>
        ${chats.map(user => `
          <div class="user-item ${state.selectedUser?.username === user.username ? 'active' : ''}" 
               onclick="selectUser('${escapeAttr(user.username)}', ${user.id})">
            <div class="avatar ${getAvatarClass(user.id)}">${getInitials(user.username)}</div>
            <div class="details">
              <div class="name">${escapeHtml(user.username)}</div>
              <div class="last-message">
                ${user.lastMessage 
                  ? (user.lastMessageIsMine ? 'Вы: ' : '') + escapeHtml(truncate(user.lastMessage, 30))
                  : '💬 Начните диалог'}
              </div>
            </div>
            <div class="meta">
              ${user.lastMessageTime ? `<div class="time">${formatTime(user.lastMessageTime)}</div>` : ''}
              ${user.unreadCount > 0 ? `<div class="unread-badge">${user.unreadCount}</div>` : ''}
            </div>
          </div>
        `).join('')}
      `;
    }

    function renderSearchResults(users, query) {
      const container = document.getElementById('usersList');
      
      if (users.length === 0) {
        container.innerHTML = `
          <div class="users-title">Поиск: "${escapeHtml(query)}"</div>
          <div class="no-users">
            <div class="icon">🔍</div>
            <p>Никого не найдено</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="users-title">Найдено: ${users.length}</div>
        ${users.map(user => `
          <div class="user-item" 
               onclick="selectUser('${escapeAttr(user.username)}', ${user.id})">
            <div class="avatar ${getAvatarClass(user.id)}">${getInitials(user.username)}</div>
            <div class="details">
              <div class="name">${escapeHtml(user.username)}</div>
              <div class="last-message">@${escapeHtml(user.username)}</div>
            </div>
          </div>
        `).join('')}
      `;
    }

    function selectUser(username, id) {
      state.selectedUser = { username, id };

      document.getElementById('emptyChat').style.display = 'none';
      document.getElementById('activeChat').style.display = 'flex';
      
      document.getElementById('partnerName').textContent = username;
      document.getElementById('partnerAvatar').textContent = getInitials(username);
      document.getElementById('partnerAvatar').className = `avatar ${getAvatarClass(id)}`;

      document.querySelectorAll('.user-item').forEach(el => {
        el.classList.remove('active');
        if (el.onclick.toString().includes(`'${username}'`)) {
          el.classList.add('active');
        }
      });

      state.messages = [];
      state.renderedMessageIds = new Set();
      state.lastRenderedDate = '';
      document.getElementById('messagesContainer').innerHTML = '';

      loadMessages(true);

      if (state.pollInterval) clearInterval(state.pollInterval);
      state.pollInterval = setInterval(() => loadMessages(false), 2000);

      document.getElementById('messageInput').focus();

      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.add('hidden');
        document.getElementById('chatArea').classList.add('active');
      }
    }

    function closeMobileChat() {
      document.getElementById('sidebar').classList.remove('hidden');
      document.getElementById('chatArea').classList.remove('active');
    }

    async function loadMessages(isFirstLoad = false) {
      if (!state.selectedUser) return;

      try {
        const response = await fetch(
          `/api/messages?with=${encodeURIComponent(state.selectedUser.username)}&currentUsername=${encodeURIComponent(state.currentUser.username)}`
        );
        const data = await response.json();

        if (data.success) {
          const wasAtBottom = isScrolledToBottom();
          const oldCount = state.messages.length;
          state.messages = data.messages;
          
          appendNewMessages(data.messages);

          const hasNewMessages = data.messages.length > oldCount;
          if (isFirstLoad || wasAtBottom || hasNewMessages) {
            scrollToBottom();
          }

          if (hasNewMessages && !state.isSearching) {
            loadChats();
          }
        }
      } catch (error) {
        console.error('Ошибка загрузки сообщений:', error);
      }
    }

    function appendNewMessages(messages) {
      const container = document.getElementById('messagesContainer');
      
      if (messages.length === 0) {
        if (state.renderedMessageIds.size === 0) {
          container.innerHTML = `
            <div class="empty-chat" style="height: 100%;">
              <div class="icon">👋</div>
              <h2>Начните общение</h2>
              <p>Отправьте первое сообщение</p>
            </div>
          `;
        }
        return;
      }

      const emptyBlock = container.querySelector('.empty-chat');
      if (emptyBlock) {
        container.innerHTML = '';
        state.lastRenderedDate = '';
      }

      let html = '';
      
      messages.forEach(msg => {
        if (state.renderedMessageIds.has(msg.id)) return;

        const msgDate = formatDate(msg.timestamp);
        
        if (msgDate !== state.lastRenderedDate) {
          html += `<div class="date-divider"><span>${msgDate}</span></div>`;
          state.lastRenderedDate = msgDate;
        }

        const isMine = msg.sender_username === state.currentUser.username;
        html += `
          <div class="message ${isMine ? 'mine' : 'other'}">
            <div class="message-bubble">
              <div class="message-text">${escapeHtml(msg.message_text)}</div>
              <div class="message-time">${formatMessageTime(msg.timestamp)}</div>
            </div>
          </div>
        `;
        
        state.renderedMessageIds.add(msg.id);
      });

      if (html) {
        container.insertAdjacentHTML('beforeend', html);
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();

      if (!text || !state.selectedUser) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;

      try {
        const response = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            senderUsername: state.currentUser.username,
            receiverUsername: state.selectedUser.username,
            messageText: text
          })
        });

        const data = await response.json();

        if (data.success) {
          input.value = '';
          input.style.height = 'auto';
          
          state.messages.push(data.message);
          appendNewMessages([data.message]);
          scrollToBottom();
          
          if (!state.isSearching) {
            loadChats();
          }
        } else {
          alert(data.error || 'Ошибка отправки');
        }
      } catch (error) {
        console.error('Ошибка отправки:', error);
        alert('Ошибка сети');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // =============================================
    // УТИЛИТЫ
    // =============================================
    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function getAvatarClass(id) {
      const colors = ['avatar-1', 'avatar-2', 'avatar-3', 'avatar-4', 'avatar-5', 'avatar-6'];
      return colors[(parseInt(id) || 0) % colors.length];
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      if (!text) return '';
      return String(text).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function truncate(text, length) {
      if (!text) return '';
      return text.length > length ? text.substring(0, length) + '...' : text;
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));

      if (diffDays === 0) {
        return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      } else if (diffDays === 1) {
        return 'Вчера';
      } else if (diffDays < 7) {
        return date.toLocaleDateString('ru-RU', { weekday: 'short' });
      } else {
        return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
      }
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));

      if (diffDays === 0) return 'Сегодня';
      if (diffDays === 1) return 'Вчера';
      return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatMessageTime(timestamp) {
      return new Date(timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function isScrolledToBottom() {
      const container = document.getElementById('messagesContainer');
      return container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
    }

    function scrollToBottom() {
      const container = document.getElementById('messagesContainer');
      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 50);
    }

    window.addEventListener('beforeunload', () => {
      if (state.pollInterval) clearInterval(state.pollInterval);
      if (state.usersPollInterval) clearInterval(state.usersPollInterval);
      if (state.accountsUnreadInterval) clearInterval(state.accountsUnreadInterval);
    });
  </script>
</body>
</html>
