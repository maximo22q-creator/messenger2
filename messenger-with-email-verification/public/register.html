<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация | Messenger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .container { width: 100%; max-width: 420px; }
    .card {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 24px; padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 16px; font-size: 32px;
    }
    .logo h1 { color: #fff; font-size: 28px; font-weight: 700; }
    .logo p { color: #94a3b8; margin-top: 8px; font-size: 14px; }
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: none;
    }
    .error-box p { color: #f87171; font-size: 14px; text-align: center; }
    .success-box {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; display: none;
    }
    .success-box p { color: #4ade80; font-size: 14px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; color: #cbd5e1; font-size: 14px; font-weight: 500; margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 14px 18px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 12px; color: #fff; font-size: 16px;
      transition: all 0.3s ease;
    }
    .form-group input::placeholder { color: #64748b; }
    .form-group input:focus {
      outline: none; border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none; border-radius: 12px; color: #fff;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px -10px rgba(99, 102, 241, 0.6); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-loading { display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-link { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 14px; }
    .footer-link a { color: #818cf8; text-decoration: none; font-weight: 500; transition: color 0.3s; }
    .footer-link a:hover { color: #a5b4fc; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">💬</div>
        <h1>Регистрация</h1>
        <p>Создайте аккаунт в мессенджере</p>
      </div>

      <div class="error-box" id="errorBox"><p id="errorText"></p></div>
      <div class="success-box" id="successBox"><p id="successText"></p></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Ник</label>
          <input type="text" id="username" name="username" placeholder="Придумай уникальный ник" required autocomplete="username" minlength="3" maxlength="20">
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required minlength="6" autocomplete="new-password">
        </div>

        <button type="submit" class="btn" id="submitBtn">Зарегистрироваться</button>
      </form>

      <p class="footer-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const successBox = document.getElementById('successBox');
    const successText = document.getElementById('successText');

    function showError(msg) { errorBox.style.display='block'; errorText.textContent=msg; successBox.style.display='none'; }
    function showSuccess(msg) { successBox.style.display='block'; successText.textContent=msg; errorBox.style.display='none'; }
    function setLoading(l) {
      submitBtn.disabled = l;
      submitBtn.innerHTML = l ? '<span class="btn-loading"><span class="spinner"></span> Создание...</span>' : 'Зарегистрироваться';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      errorBox.style.display = 'none';
      setLoading(true);

      try {
        const response = await fetch('/register', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();

        if (data.success) {
          showSuccess('✅ Аккаунт создан! Вход...');
          localStorage.setItem('userName', data.user.username);
          localStorage.setItem('userId', data.user.id);
          setTimeout(() => { window.location.href = 'chat.html'; }, 1000);
        } else {
          showError(data.error || 'Ошибка регистрации');
        }
      } catch (err) {
        showError('Ошибка сети. Попробуйте позже.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
