<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подтверждение | Messenger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 32px;
    }

    .logo h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
    }

    .logo p {
      color: #94a3b8;
      margin-top: 8px;
      font-size: 14px;
    }

    .logo .email {
      color: #818cf8;
      font-weight: 500;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
    }

    .error-box p {
      color: #f87171;
      font-size: 14px;
      text-align: center;
    }

    .success-box {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: none;
    }

    .success-box p {
      color: #4ade80;
      font-size: 14px;
      text-align: center;
    }

    .code-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .code-input {
      width: 50px;
      height: 60px;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(71, 85, 105, 0.5);
      border-radius: 12px;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      transition: all 0.3s ease;
    }

    .code-input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
    }

    .code-input.filled {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px -10px rgba(16, 185, 129, 0.5);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px -10px rgba(16, 185, 129, 0.6);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-loading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      color: #94a3b8;
      font-size: 14px;
    }

    .footer-link a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .footer-link a:hover {
      color: #a5b4fc;
    }

    .tip {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">📧</div>
        <h1>Подтверждение</h1>
        <p>Введите 6-значный код, отправленный на</p>
        <p class="email" id="emailDisplay">загрузка...</p>
      </div>

      <div class="error-box" id="errorBox">
        <p id="errorText"></p>
      </div>

      <div class="success-box" id="successBox">
        <p id="successText"></p>
      </div>

      <form id="verifyForm">
        <div class="code-inputs" id="codeInputs">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="0">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="1">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4">
          <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="5">
        </div>

        <button type="submit" class="btn" id="submitBtn">
          Подтвердить
        </button>
      </form>

      <p class="tip">💡 Проверьте папку "Спам", если письмо не пришло</p>

      <p class="footer-link">
        <a href="register.html">← Вернуться к регистрации</a>
      </p>
    </div>
  </div>

  <script>
    // Получаем email из localStorage
    const email = localStorage.getItem('pendingEmail');
    const emailDisplay = document.getElementById('emailDisplay');

    if (!email) {
      window.location.href = 'register.html';
    } else {
      emailDisplay.textContent = email;
    }

    const form = document.getElementById('verifyForm');
    const inputs = document.querySelectorAll('.code-input');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const successBox = document.getElementById('successBox');
    const successText = document.getElementById('successText');

    // Фокус на первом инпуте
    inputs[0].focus();

    // Обработка ввода
    inputs.forEach((input, index) => {
      // Только цифры
      input.addEventListener('input', (e) => {
        const value = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = value;
        
        if (value) {
          input.classList.add('filled');
          // Переход к следующему полю
          if (index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        } else {
          input.classList.remove('filled');
        }
      });

      // Backspace - переход к предыдущему
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
          inputs[index - 1].value = '';
          inputs[index - 1].classList.remove('filled');
        }
      });

      // Вставка кода из буфера
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const paste = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        if (paste.length === 6) {
          paste.split('').forEach((char, i) => {
            inputs[i].value = char;
            inputs[i].classList.add('filled');
          });
          inputs[5].focus();
        }
      });
    });

    function showError(message) {
      errorBox.style.display = 'block';
      errorText.textContent = message;
      successBox.style.display = 'none';
    }

    function showSuccess(message) {
      successBox.style.display = 'block';
      successText.textContent = message;
      errorBox.style.display = 'none';
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      if (isLoading) {
        submitBtn.innerHTML = '<span class="btn-loading"><span class="spinner"></span> Проверка...</span>';
      } else {
        submitBtn.textContent = 'Подтвердить';
      }
    }

    function getCode() {
      return Array.from(inputs).map(i => i.value).join('');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = getCode();
      
      if (code.length !== 6) {
        showError('Введите все 6 цифр');
        return;
      }

      errorBox.style.display = 'none';
      setLoading(true);

      try {
        const response = await fetch('/verify', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, code })
        });

        const data = await response.json();

        if (data.success) {
          showSuccess('✅ Аккаунт подтверждён! Перенаправление на вход...');
          localStorage.removeItem('pendingEmail');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          showError(data.error || 'Неверный код');
          // Очищаем поля
          inputs.forEach(i => {
            i.value = '';
            i.classList.remove('filled');
          });
          inputs[0].focus();
        }
      } catch (error) {
        showError('Ошибка сети. Попробуйте позже.');
        console.error(error);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
